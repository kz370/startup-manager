<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Launcher</title>
    <meta name="description" content="Run and stop apps from one place" />
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>App Launcher</h1>
          <p class="tagline">Start and stop programs from your list</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn" id="btn-export" type="button">Export settings</button>
        <button class="btn" id="btn-import" type="button">Import settings</button>
        <button class="btn btn-primary" id="btn-add" type="button">Add app</button>
        <button class="btn btn-success" id="btn-run-all" type="button">Start all</button>
      </div>
    </header>

    <div class="batch-toolbar" id="batch-toolbar">
      <span class="batch-count" id="batch-count">0 selected</span>
      <div class="batch-actions">
        <button class="btn btn-success" id="btn-batch-run" type="button">Start</button>
        <button class="btn btn-danger" id="btn-batch-stop" type="button">Stop</button>
        <button class="btn btn-danger" id="btn-batch-delete" type="button">Remove</button>
      </div>
    </div>

    <main class="list-scroll">
      <ul class="app-list" id="app-list" aria-label="Applications"></ul>
    </main>

    <footer class="app-footer">
      <span id="app-count">0 apps</span>
      <span class="footer-hint"
        >Close hides to the tray; use Quit in the tray menu to exit. Executable name defaults from the path if left blank.</span>
    </footer>

    <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title">Add app</h2>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label for="f-name">Display name</label>
            <input type="text" id="f-name" placeholder="e.g. Slack" autocomplete="off" />
          </div>

          <div class="form-group">
            <label>Executable path</label>
            <div class="browse-input-row">
              <input type="text" id="f-path" placeholder="Browse to select .exe, .bat, .cmd, or shortcut" readonly />
              <button class="btn btn-primary" id="btn-browse" type="button">Browse</button>
            </div>
          </div>

          <div class="form-group">
            <label for="f-process">Process name (optional)</label>
            <input
              type="text"
              id="f-process"
              placeholder="e.g. notepad.exe — leave empty to use the file name from the path"
              autocomplete="off"
            />
            <p class="field-hint">Used to detect running state and to stop the app. Must match Task Manager “Name”.</p>
          </div>

          <div class="form-group">
            <label for="f-args">Arguments (optional)</label>
            <input type="text" id="f-args" placeholder="--silent" autocomplete="off" />
          </div>
        </div>

        <div class="modal-footer">
          <button class="btn" id="btn-cancel" type="button">Cancel</button>
          <button class="btn btn-primary" id="btn-form-save" type="button">Save</button>
        </div>
      </div>
    </div>

    <div id="toast-container" aria-live="polite"></div>
  </body>
</html>
